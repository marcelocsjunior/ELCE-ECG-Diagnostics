# ECG Diagnostics Core v5.2.4 - perfil da estação/laboratório
# StationRole aceita: AUTO, EXECUTANTE, VIEWER, HOST_XP
# MonitorMinutes e SampleIntervalSeconds são respeitados nos modos Auto/Fix/Monitor.
# CpuProcessCaptureThreshold aciona captura do processo dominante em CPU alta do sistema ou do ECGV6.
# TopProcessCaptureCount define quantos processos entram na captura do evento crítico.
# EnableLatencyMetrics mede latência do probe UNC do banco e do NetDir.
# EnableEcgProcessMetrics mede CPU do processo ECGV6 via contador de performance.
# EnableDiskMetrics habilita coleta de fila de disco.
# EnableNetworkMetrics habilita coleta de bytes totais de rede.

ExpectedDbPath=\\192.168.1.57\Database
ExpectedNetDir=\\192.168.1.57\Database\NetDir
ExpectedExePath=C:\HW\ECG\ECGV6.exe
SetMachineHwPath=true
OutDir=C:\ECG\FieldKit\out
StationRole=AUTO
StationAlias=VIEWER
MonitorMinutes=3
SampleIntervalSeconds=15
CpuProcessCaptureThreshold=80
TopProcessCaptureCount=3
EnableLatencyMetrics=true
EnableEcgProcessMetrics=true
EnableDiskMetrics=false
EnableNetworkMetrics=false
